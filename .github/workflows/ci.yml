# ============================================================
# ConfigDev — Continuous Integration Pipeline
# Triggers: push to main, pull requests targeting main
# ============================================================

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Cancel any in-progress run for the same branch/PR to save
# runner minutes when new commits are pushed quickly.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────
  # Job: lint
  # Validates code style and catches static errors early.
  # ──────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm" # caches ~/.npm between runs for faster installs

      - name: Install dependencies
        run: npm ci
        # npm ci is used instead of npm install to guarantee
        # a clean, reproducible install from package-lock.json.

      - name: Run linter
        run: npm run lint

  # ──────────────────────────────────────────────────────────
  # Job: build
  # Compiles the project; depends on lint passing first.
  # ──────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      # Optional: Upload build artifacts for inspection or deployment.
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/ 
          retention-days: 7
          if-no-files-found: warn
